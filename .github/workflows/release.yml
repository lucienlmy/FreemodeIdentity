name: Release

on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # CMake's VS generator needs the full VS dev environment to find the installed
      # instance; setup-msbuild alone isn't enough for the native (.asi) build.
      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # The tag is the source of truth for the version. Stamp it into the csproj +
      # AssemblyInfo before packaging so the artifact (and the gta5mod.json / zip name
      # / in-game version that derive from it) all match the tag — no pre-release bump
      # commit. Touches only the runner's checkout.
      - name: Set version from tag
        shell: pwsh
        run: ./scripts/set-version.ps1 "${{ github.ref_name }}"

      - name: Fetch reference assemblies
        shell: pwsh
        run: ./scripts/fetch-deps.ps1

      # `make package` builds BOTH halves (C# .dll + native .asi) first, so no
      # separate build steps are needed.
      - name: Lint
        shell: bash
        run: make lint MSBUILD=MSBuild.exe

      - name: Test
        shell: bash
        run: make test

      # NATIVE_GEN=Ninja: build the .asi with Ninja+cl (see ci.yml). It propagates to the
      # native sub-build and sets the staged .asi path package copies from.
      - name: Package
        shell: bash
        run: make package MSBUILD=MSBuild.exe NATIVE_GEN=Ninja

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FreemodeIdentity.zip
          generate_release_notes: true
