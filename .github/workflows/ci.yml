name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  build:
    # Hybrid mod: the C# side (SHVDN3, .NET 4.8 + MSBuild) and the native .asi shim
    # (CMake + MSVC) are both Windows-only — windows-latest has VS2022 + CMake.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # setup-msbuild only puts MSBuild on PATH; CMake's "Visual Studio 17 2022"
      # generator needs the full VS dev environment (vcvars) to discover the
      # installed instance, or it fails with "could not find any instance of
      # Visual Studio". This sets that up for the native build.
      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # The C# build links against SHVDN/LemonUI from ..\packages\ — the player's
      # runtime assemblies, not in the repo. Pull pinned copies before building.
      # (The native side's deps — MinHook, ScriptHookV lib — are vendored in-repo.)
      - name: Fetch reference assemblies
        shell: pwsh
        run: ./scripts/fetch-deps.ps1

      # Everything goes through the Makefile so it stays the single source of
      # truth. setup-msbuild puts MSBuild on PATH, so pass it explicitly.
      - name: Lint (clean rebuild, warnings as the static check)
        shell: bash
        run: make lint MSBUILD=MSBuild.exe

      - name: Test (prints manual steps; the game is the integration test)
        shell: bash
        run: make test

      - name: Build C# mod
        shell: bash
        run: make build MSBUILD=MSBuild.exe

      # Ninja + MSVC cl from the dev env above — avoids CMake's VS-generator instance
      # discovery, which fails on hosted runners ("could not find any instance of VS").
      - name: Build native shim (.asi)
        shell: bash
        run: make native NATIVE_GEN=Ninja
